# Render Blueprint - https://render.com/docs/blueprint-spec
# Deploy: Connect GitHub repo in Render Dashboard

services:
  - type: web
    name: feishu-approval-bot
    runtime: python
    region: frankfurt  # Closest to Stockholm
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:APP --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Secrets - set these in Render Dashboard
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_VERIFICATION_TOKEN
        sync: false
      - key: FEISHU_SIGNING_SECRET
        sync: false
      # Dropbox (https://www.dropbox.com/developers/apps)
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      # Resend Email (https://resend.com)  # for email
      # - key: RESEND_API_KEY  # for email
      #   sync: false  # for email
      # - key: RESEND_FROM_EMAIL  # for email
      #   sync: false  # for email
      # Target emails for approval types  # for email
      # - key: EMAIL_EXPENSE  # for email
      #   sync: false  # for email
      # - key: EMAIL_PAYMENT_SWEDEN_SHIC  # for email
      #   sync: false  # for email
    healthCheckPath: /health
